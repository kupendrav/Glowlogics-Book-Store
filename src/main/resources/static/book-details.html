<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glowlogics Book Store | Book Details</title>
    <link rel="icon" type="image/png" href="images/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<header class="site-header">
    <a class="logo" href="index.html">Glowlogics Book Store</a>
    <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="privacy-policy.html">Privacy</a>
        <a href="terms-and-conditions.html">Terms</a>
    </nav>
    <div class="header-actions">
        <a class="nav-cart" href="cart.html" aria-label="Bag">
            <span class="nav-cart-icon" aria-hidden="true">&#128717;</span>
            <span class="cart-badge" id="cartBadge">0</span>
        </a>
        <a id="authCta" class="btn-outline" href="auth.html">Login / Signup</a>
        <button id="logoutBtn" class="btn-ghost hidden" type="button">Logout</button>
    </div>
</header>

<main>
    <h1 id="bookTitle" class="page-title reveal">Book Details</h1>

    <section class="book-details-layout reveal" id="bookDetailsLayout">
        <div class="book-details-card">
            <img id="bookImage" alt="Book cover">
        </div>

        <article class="panel">
            <p id="bookAuthor" class="subtext"></p>
            <div class="price-row" id="bookPriceRow"></div>
            <h3 class="detail-heading">Short Summary</h3>
            <p id="bookSummary" class="detail-highlight"></p>
            <h3 class="detail-heading">Author Introduction</h3>
            <p id="authorIntroduction" class="detail-highlight"></p>
            <h3 class="detail-heading">About This Book</h3>
            <p id="bookDescription"></p>
            <button id="addToCartButton" class="btn" type="button">Add To Bag</button>
        </article>
    </section>

    <section class="panel reveal" style="margin-top:16px;">
        <h2>Book Reviews</h2>
        <p class="subtext">Add your thoughts with comments and ratings.</p>

        <div id="reviewsList" class="review-list"></div>

        <form id="reviewForm" class="auth-form active" style="margin-top: 10px;">
            <label for="rating">Rating</label>
            <select id="rating" required>
                <option value="5">5 - Excellent</option>
                <option value="4">4 - Very Good</option>
                <option value="3">3 - Good</option>
                <option value="2">2 - Fair</option>
                <option value="1">1 - Poor</option>
            </select>

            <label for="comment">Comment</label>
            <textarea id="comment" rows="4" placeholder="Share your review..." required></textarea>
            <button class="btn" type="submit">Submit Review</button>
        </form>
    </section>
</main>

<footer class="footer">
    Glowlogics Book Store | Detailed pages with reviews and quick checkout.
</footer>

<script src="js/common.js"></script>
<script src="js/book.js"></script>
</body>
</html>
